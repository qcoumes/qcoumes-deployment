server {
    listen 80;
    server_name _;

    # Increase limits for uploads
    client_max_body_size 100M;
    limit_rate 1M;

    # Redirect old /index.php/Page URLs to /wiki/Page
    location ~ ^/index\.php/(.*)$ {
        return 301 /wiki/$1$is_args$args;
    }

    # Short URL entry point: /wiki/Page -> /index.php?title=Page
    location /wiki/ {
        rewrite ^/wiki/(.*)$ /index.php?title=$1 last;
    }

    # Everything else goes to the MediaWiki container
    location / {
        proxy_pass http://emushpedia-mediawiki-es:80;

        # Preserve client/proxy info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (safe to include)
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
